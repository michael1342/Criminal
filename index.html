<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visit Checker</title>
    <link rel="stylesheet" href="array-style.css">
</head>
<body>
    <div class="card">
        <h1>Crime Suspect Tracker</h1>
        <p>Enter a place name and see how many times Suspect visited it.</p>
        <input type="text" id="place" placeholder="e.g. market">
        <button id="btn">Check</button>
        <p id="log"></p>
        <p class="hint">Try one of: market, church, office, mall, gym, bank, saloon, eatery, spa, club, airport</p>
    </div>
    <script src="array-assignment.js" defer></script>
</body>
</html>
